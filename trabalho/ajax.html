<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Busca Filmes</h1>
    <label for="busca">Busca</label>
    <input type="text" id="busca">
    <button id="button">Buscar</button>

    <div class="resultado"></div>
    <script>
        const apikey = "f77bfada";
        const button = document.getElementById("button"); // Boa prática: selecionar o botão explicitamente

        button.addEventListener("click", () => {
            let stringBusca = document.getElementById("busca").value;
            
        
            fetch(`https://www.omdbapi.com/?apikey=${apikey}&s=${stringBusca}`)
                .then((result) => {
                    return result.json();
                })
                .then((data) => {
                    console.log(data);
                   
                    const filmes = data.Search;
                    
                  
                    if (filmes) {
                        exibirFilmes(filmes);
                    } else {
                        document.querySelector(".resultado").innerHTML = "<p>Nenhum filme encontrado.</p>";
                    }
                });
        });
        function exibirFilmes(filmes) {
            
            let htmlfilme = ""; 

            filmes.forEach((filme) => {
                
                htmlfilme += `<div class="filme">
                    <h2>${filme.Title}</h2>
                    <img src="${filme.Poster}" alt="${filme.Title}">
                    <p>${filme.Year}</p> 
                    </div>`;
            });
            
            let divResultado = document.querySelector(".resultado");
            divResultado.innerHTML = htmlfilme;
        }
    </script>
</body>
</html>
