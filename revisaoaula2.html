<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*CSS*/
    </style>
</head>
<body>
    <h1>Canvas</h1>
    <canvas id="canvas" height="1080px" width="1920px" style=" border: 1px solid black"> </canvas>

    <script>
        let ctx=canvas.getContext("2d")
        var mouseEvent;
        desenhando = false;
        ctx.moveTo(0,0)
        ctx.lineTo(100,100)
        ctx.stroke();

        canvas.addEventListener("mousedown",(evento)=>{
            desenhando=true;
            ctx.moveTo(evento.offsetX,evento.offsetY)
        })

        canvas.addEventListener("mouseup", ()=>{
            desenhando=false;

        })

        canvas.addEventListener("mousemove", (evento)=>{
            mouseEvent=evento
            console.log(evento.offsetX +":"+evento.offsetY)
            if(desenhando){
                ctx.lineTo(evento.offsetX,evento.offsetY)
                ctx.stroke();
            }
            
        })
    </script>

</body>
</html>
