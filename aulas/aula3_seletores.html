<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{border:1px solid black}

</head>
<body>
    <h1>seletores CSS</h1>
    <dl>
        <dt>Seletor Universal</dt>

        <dt style="border: 5px solid green;">CSS INLINE</dt>

        <dd>Nome da tag - mais especifico que o seletor universal e menos que o CSS inline</dd>
    </dl>
