<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>7-chat</title>
    <style>
        body { background-color: #e9dfa6;
              padding: 20px; }
        
        /* Janela do Chat */
        .janela-chat {
            width: 450px;
            background: rgb(123, 172, 109);
            border-radius: 8px;
            padding: 15px;;
        }
        
        /* Clearfix para os floats internos */
        .message-row {
            margin-bottom: 15px;
            overflow: hidden; 
            clear: both;
        }

        .user-label {
            font-size: 11px;
            color: #1d1c1c;
            margin-bottom: 2px;
        }
        .left .user-label { text-align: left; }
        .right .user-label { text-align: right; }

        /* Balões da Mensagem */
        .balloon {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            position: relative;
            font-size: 14px;
            line-height: 1.4;
        }

        /* Mensagem  esquerd */
        .left .balloon {
            float: left;
            background-color: #ffffff;
            border: 1px solid #ffffff;
        }

        /* Mensagem  direita*/
        .right .balloon {
            float: right;
            background-color: #3cd161; 
            border: 1px solid #3cd161;
        }

        
        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
            margin: 0 8px;
        }
        .left .avatar { float: left;
            background-color: #52c752; }
        .right .avatar { float: right;
            background-color: #ffffff; }

        .time {
            font-size: 10px;
            color: #000000;
            text-align: right;
            display: block;
            margin-top: 4px;
        }

        /* linha */
        .input-area {
            margin-top: 20px;
            border-top: 1px solid #000000;
            padding-top: 15px;
            overflow: hidden;
        }
        .input-area textarea {
            width: 100%;
            height: 50px;
            border: 1px;
            border-radius: 4px;
            padding: 10px;
            box-sizing: border-box;
        }
        .input-area button {
            float: right;
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #f5f5f5;
            border: 1px ;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="janela-chat">
        <div class="message-row left">
            <div class="user-label">Pedro Silva</div>
            <div class="avatar"></div>
            <div class="balloon">
                <p></p>Olá, tudo bem?</p>
                <span class="time">00:50</span>
            </div>
        </div>

        <div class="message-row right">
            <div class="user-label">Eu</div>
            <div class="avatar"></div>
            <div class="balloon">
                <p>Bem sim, e você?</p>
                <span class="time">00:55</span>
            </div>
        </div>

        <div class="message-row left">
            <div class="user-label">Pedro Silva</div>
            <div class="avatar"></div>
            <div class="balloon">
                <p>Vamos sair hoje? sabe conversar e Lorem ipsum dolor sit amet consectetur adipisicing elit. Illum ducimus</p>
                <span class="time">01:01</span>
            </div>
        </div>

        <div class="message-row right">
            <div class="user-label">Eu</div>
            <div class="avatar"></div>
            <div class="balloon">
                <p>Criatura ......</p>
                <span class="time">01:05</span>
            </div>
        </div>

        <div class="input-area">
            <textarea placeholder="Digite sua mensagem"></textarea>
            <button>Enviar</button>
        </div>
    </div>

</body>
</html>
