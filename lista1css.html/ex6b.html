<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>6b - Display Inline-Block / Flex</title>
    <style>
        body { margin: 0; padding: 20px;}
        .container {
            display: flex; /*blocos em linha */
            width: 100%;
        }
        .box {
            width: 100px;
            height: 100px;
            color: black;
            text-align: center;
            line-height: 100px;
            flex:1;/*mesmo tmn*/
        }
        .b1 { background-color: #6a00ff; }
        .b2 { background-color: #43a4d1; }
        .b3 { background-color: #17dd42; }
        .b4 { background-color: #ffea00; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box b1">1</div>
        <div class="box b2">2</div>
        <div class="box b3">3</div>
        <div class="box b4">4</div>
    </div>
</body>
</html>
