<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>6a - Display Block</title>
    <style>
        body { margin: 0; padding: 20px; }
        .box {
            height: 60px;
            display: block; 
            color: black;
            text-align: center;
            line-height: 60px;
        }
        .b1 { background-color: #6200ea; }
        .b2 { background-color: #00b0ff; }
        .b3 { background-color: #ff1744; }
        .b4 { background-color: #ffea00; }
    </style>
</head>
<body>
    <div class="box b1">1</div>
    <div class="box b2">2</div>
    <div class="box b3">3</div>
    <div class="box b4">4</div>
</body>
</html>
